<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metallic Dual-Color Toggle Switch</title>
    <style>
        /* Base page layout container */
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* External bounding pill-shaped capsule frame */
        .toggle-border {
            border: 2px solid #f0ebeb;
            border-radius: 130px;
            padding: 1px 2px;
            background: linear-gradient(to bottom right, white, rgba(220,220,220,.5)), white;
            box-shadow: 0 0 0 2px #fbfbfb;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* Clean native hidden structural input node */
        .toggle-border input[type="checkbox"] {
            display: none;
        }

        /* Inner background track channel containing deep shadow depth masking */
        .toggle-border label {
            position: relative;
            display: inline-block;
            width: 65px;
            height: 20px;
            background: #005ba5; /* BASE UNCHECKED STATE COLOR: Deep Blue */
            border-radius: 80px;
            cursor: pointer;
            box-shadow: inset 0 0 16px rgba(0,0,0,.3);
            transition: background .5s ease-in-out;
        }

        /* Active selected state track channel color interpolation transition */
        .toggle-border input[type="checkbox"]:checked + label {
            background: #6f42c1; /* BASE CHECKED STATE COLOR: Vibrant Purple */
        }

        /* Distinct metallic radial vinyl texture knob brush styling handles */
        .handle {
            position: absolute;
            top: -8px;
            left: -10px;
            width: 35px;
            height: 35px;
            border: 1px solid #e5e5e5;
            background: repeating-radial-gradient(circle at 50% 50%, rgba(200,200,200,.2) 0%, rgba(200,200,200,.2) 2%, transparent 2%, transparent 3%, rgba(200,200,200,.2) 3%, transparent 3%), 
                        conic-gradient(white 0%, silver 10%, white 35%, silver 45%, white 60%, silver 70%, white 80%, silver 95%, white 100%);
            border-radius: 50%;
            box-shadow: 3px 5px 10px 0 rgba(0,0,0,.4);
            transition: left .4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Checked terminal slide boundary matrix offset logic recalculation */
        .toggle-border input[type="checkbox"]:checked + label > .handle {
            left: calc(100% - 35px + 10px); /* Safely computes boundary lock without escaping track capsule dimensions */
        }
    </style>
</head>
<body>

    <div class="toggle-border">
        <input id="one" type="checkbox">
        <label for="one">
            <div class="handle"></div>
        </label>
    </div>

</body>
</html>
