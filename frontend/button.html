<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Aware Button Only</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:400|Raleway:300">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        /* Global Framework setup matching original rules */
        body {
            padding-top: 50px;
            font-family: 'Open Sans', Helvetica, arial, sans-serif;
            text-align: center;
            background-color: #eeeeee;
            margin: 0;
        }

        *, *:before, *:after {
            box-sizing: border-box;
            transition: 0.5s ease-in-out;
        }

        /* Prevent parent transitions from affecting programmatic positioning child */
        span {
            transition: none;
        }

        *:before, *:after {
            z-index: -1;
        }

        a {
            text-decoration: none;
            line-height: 80px;
            color: black;
        }

        .centerer {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* --- COMPILED TARGET COMPONENT HOVER RULES --- */
        .btn-6 {
            position: relative;
            display: block;
            overflow: hidden;
            width: 100%;
            height: 80px;
            max-width: 250px;
            margin: 1rem auto;
            text-transform: uppercase;
            border: 1px solid currentColor;
            color: #005ba5;
            border-color: #005ba5;
            background-color: transparent;
        }
        
        .btn-6 span {
            position: absolute;
            display: block;
            width: 0;
            height: 0;
            border-radius: 50%;
            background-color: #003366; /* Shaded dark version of button color */
            transition: width 0.4s ease-in-out, height 0.4s ease-in-out;
            transform: translate(-50%, -50%);
            z-index: -1;
        }
        
        .btn-6:hover {
            color: #b3d7ff;
        }

        /* Expand diameter calculation outward from internal entry mouse coordinate */
        .btn-6:hover span {
            width: 562.5px;   /* 225% of container width constraint */
            height: 562.5px;
        }
        
        .btn-6:active {
            background-color: #005ba5;
        }
    </style>
</head>
<body>

<div class="centerer">
    <a class="btn-6" href="#">Position Aware<span></span></a>
</div>

<script>
    $(function() {  
        $('.btn-6')
            .on('mouseenter', function(e) {
                var parentOffset = $(this).offset(),
                    relX = e.pageX - parentOffset.left,
                    relY = e.pageY - parentOffset.top;
                $(this).find('span').css({top:relY, left:relX})
            })
            .on('mouseout', function(e) {
                var parentOffset = $(this).offset(),
                    relX = e.pageX - parentOffset.left,
                    relY = e.pageY - parentOffset.top;
                $(this).find('span').css({top:relY, left:relX})
            });
    });
</script>

</body>
</html>
